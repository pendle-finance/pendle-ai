description: "Layer 2 — MCP semantic tool tests (calls 25 tools against live Pendle API)"

# ─── Provider: remote MCP server ───────────────────────────────────────────
# Set PENDLE_MCP_URL to test against a local server (e.g. http://localhost:9000/mcp)
# Defaults to production: http://api-v2.pendle.finance/core/mcp
maxConcurrency: 1

providers:
  - id: mcp
    config:
      enabled: true
      timeout: 60000
      server:
        url: '{{ env.PENDLE_MCP_URL }}'
        name: pendle-mcp

prompts:
  - '{{prompt}}'

# ─── Test constants ─────────────────────────────────────────────────────────
# Arbitrum chain ID:    42161
# Test market (USDai):  0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3
# USDC:                 0xaf88d065e77c8cC2239327C5EDb3A432268e5831
# WETH (Arb):           0x82aF49447D8a07e3bd95BD0d56f35241523fBab1
# Dummy receiver:       0x1111111111111111111111111111111111111111
#
# NOTE: MCP provider returns [{"type":"text","text":"<json>"}].
# The defaultTest.options.transform unwraps the MCP envelope so assertions see raw JSON.

defaultTest:
  options:
    transform: |
      try { const mcp = JSON.parse(output); return Array.isArray(mcp) && mcp[0]?.text ? mcp[0].text : output; } catch { return output; }

tests:

  # ══════════════════════════════════════════════════════════════════════════
  # QUERY TOOLS (11 tools: get_markets, get_asset, get_chains, get_market,
  #              get_prices, get_history, get_portfolio, get_order_book,
  #              resolve_token, preview_trade, pendle_router)
  # ══════════════════════════════════════════════════════════════════════════

  - description: "get_markets returns active markets with expiry filter"
    vars:
      prompt: >
        {"tool": "get_markets", "args": {
          "filter": [{"field": "expiry", "op": ">", "value": "2026-01-01T00:00:00Z"}],
          "limit": 5
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          const arr = Array.isArray(d) ? d : [];
          return arr.length > 0 && arr[0].address != null;

  - description: "get_markets filters by chainId"
    vars:
      prompt: >
        {"tool": "get_markets", "args": {
          "filter": [{"field": "chainId", "op": "=", "value": 42161}],
          "limit": 3
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          const arr = Array.isArray(d) ? d : [];
          return arr.length > 0 && arr.every(m => m.chainId === 42161);

  - description: "get_markets looks up specific market by address with one flag"
    vars:
      prompt: >
        {"tool": "get_markets", "args": {
          "filter": [
            {"field": "chainId", "op": "=", "value": 42161},
            {"field": "address", "op": "=", "value": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3"}
          ],
          "one": true
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return d != null && d.address?.toLowerCase() === '0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3';

  - description: "get_markets sorts by details_impliedApy descending"
    vars:
      prompt: >
        {"tool": "get_markets", "args": {
          "sort": {"field": "details_impliedApy", "direction": "desc"},
          "limit": 5
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          const arr = Array.isArray(d) ? d : [];
          return arr.length > 0 && arr[0].details_impliedApy != null;

  - description: "get_markets sorts ascending by details_liquidity"
    vars:
      prompt: >
        {"tool": "get_markets", "args": {
          "sort": {"field": "details_liquidity", "direction": "asc"},
          "limit": 3
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          const arr = Array.isArray(d) ? d : [];
          if (arr.length < 2) return arr.length > 0;
          return arr[0].details_liquidity <= arr[1].details_liquidity;

  - description: "get_markets numeric > filter on details_liquidity"
    vars:
      prompt: >
        {"tool": "get_markets", "args": {
          "filter": [{"field": "details_liquidity", "op": ">", "value": 1000000}],
          "limit": 5
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          const arr = Array.isArray(d) ? d : [];
          return arr.length > 0 && arr.every(m => m.details_liquidity > 1000000);

  - description: "get_markets boolean filter isPrime = 1"
    vars:
      prompt: >
        {"tool": "get_markets", "args": {
          "filter": [{"field": "isPrime", "op": "=", "value": 1}],
          "limit": 5
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          const arr = Array.isArray(d) ? d : [];
          return arr.length > 0 && arr.every(m => m.isPrime === 1);

  - description: "get_markets != operator excludes chain"
    vars:
      prompt: >
        {"tool": "get_markets", "args": {
          "filter": [{"field": "chainId", "op": "!=", "value": 1}],
          "limit": 5
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          const arr = Array.isArray(d) ? d : [];
          return arr.length > 0 && arr.every(m => m.chainId !== 1);

  - description: "get_markets pagination with skip returns different results"
    vars:
      prompt: >
        {"tool": "get_markets", "args": {
          "sort": {"field": "details_impliedApy", "direction": "desc"},
          "limit": 2,
          "skip": 2
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          const arr = Array.isArray(d) ? d : [];
          return arr.length > 0 && arr.length <= 2;

  - description: "get_markets compound filter: chain + numeric + expiry"
    vars:
      prompt: >
        {"tool": "get_markets", "args": {
          "filter": [
            {"field": "chainId", "op": "=", "value": 42161},
            {"field": "details_impliedApy", "op": ">", "value": 0.01},
            {"field": "expiry", "op": ">", "value": "2026-01-01T00:00:00Z"}
          ],
          "sort": {"field": "details_impliedApy", "direction": "desc"},
          "limit": 5
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          const arr = Array.isArray(d) ? d : [];
          return arr.length > 0 && arr.every(m => m.chainId === 42161 && m.details_impliedApy > 0.01);

  - description: "get_markets invalid field name returns error"
    vars:
      prompt: >
        {"tool": "get_markets", "args": {
          "filter": [{"field": "nonexistent_column", "op": "=", "value": 1}]
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return d.ok === false && d.error.message.includes('Invalid filter field');

  - description: "get_markets invalid operator returns error"
    vars:
      prompt: >
        {"tool": "get_markets", "args": {
          "filter": [{"field": "chainId", "op": "DROP TABLE", "value": 1}]
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return d.ok === false && d.error.message.includes('Invalid filter operator');

  - description: "get_asset returns metadata for a known Pendle token"
    vars:
      prompt: >
        {"tool": "get_asset", "args": {
          "chainId": 42161,
          "address": "0x1cdde40e29da213f42a7fa109ccadca372d9ee1b"
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return d.address != null && d.symbol != null && d.chainId === 42161;

  - description: "get_asset returns all expected fields in response"
    vars:
      prompt: >
        {"tool": "get_asset", "args": {
          "chainId": 42161,
          "address": "0x1cdde40e29da213f42a7fa109ccadca372d9ee1b"
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return (
            typeof d.address === 'string' &&
            typeof d.chainId === 'number' &&
            typeof d.name === 'string' &&
            typeof d.symbol === 'string' &&
            typeof d.decimals === 'number' &&
            d.tags != null
          );

  - description: "get_asset handles mixed-case address input"
    vars:
      prompt: >
        {"tool": "get_asset", "args": {
          "chainId": 42161,
          "address": "0x1CddE40E29DA213F42a7fA109cCAdCA372D9EE1B"
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return d.address != null && d.symbol != null && d.chainId === 42161;

  - description: "get_asset returns error for unknown address"
    vars:
      prompt: >
        {"tool": "get_asset", "args": {
          "chainId": 42161,
          "address": "0x0000000000000000000000000000000000000001"
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return d.ok === false && d.error != null;

  - description: "get_asset error for unknown address suggests resolve_token"
    vars:
      prompt: >
        {"tool": "get_asset", "args": {
          "chainId": 42161,
          "address": "0x0000000000000000000000000000000000000001"
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return d.ok === false && d.error.message.includes('resolve_token');

  - description: "get_chains returns array of chain IDs"
    vars:
      prompt: >
        {"tool": "get_chains", "args": {}}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return Array.isArray(d.chainIds) && d.chainIds.length > 0 && d.chainIds.includes(42161);

  - description: "get_market returns merged APY + token data"
    vars:
      prompt: >
        {"tool": "get_market", "args": {
          "chainId": 42161,
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3"
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return d.data != null && d.tokens != null && d.identity != null;

  - description: "get_prices returns prices for USDC + PT"
    vars:
      prompt: >
        {"tool": "get_prices", "args": {
          "chainId": 42161,
          "addresses": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831,0x1cdde40e29da213f42a7fa109ccadca372d9ee1b"
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          const prices = d.prices || d;
          return Object.keys(prices).length >= 2;

  - description: "get_history returns time-series data"
    vars:
      prompt: >
        {"tool": "get_history", "args": {
          "chainId": 42161,
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3",
          "fields": "timestamp,impliedApy,underlyingApy"
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          const arr = d.results || (Array.isArray(d) ? d : []);
          return arr.length > 0;

  - description: "get_portfolio returns valid response for dummy wallet"
    vars:
      prompt: >
        {"tool": "get_portfolio", "args": {
          "user": "0x1111111111111111111111111111111111111111"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          try { JSON.parse(s); return true; } catch { return false; }

  - description: "get_order_book returns order book entries"
    vars:
      prompt: >
        {"tool": "get_order_book", "args": {
          "chainId": 42161,
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return d.longYieldEntries != null || d.shortYieldEntries != null;

  - description: "resolve_token finds USDC on Arbitrum"
    vars:
      prompt: >
        {"tool": "resolve_token", "args": {
          "chainId": 42161,
          "query": "USDC"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return d.ok === true && Array.isArray(d.matches) && d.matches.length > 0;
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return d.matches.some(m => m.symbol?.toUpperCase().includes('USDC') || m.name?.toUpperCase().includes('USDC'));

  - description: "resolve_token returns empty for nonsense query"
    vars:
      prompt: >
        {"tool": "resolve_token", "args": {
          "chainId": 42161,
          "query": "ZZZZNONEXISTENT12345"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return d.ok === true && Array.isArray(d.matches) && d.matches.length === 0 && d.hint != null;

  - description: "preview_trade buy_pt returns preview without tx.data"
    vars:
      prompt: >
        {"tool": "preview_trade", "args": {
          "chainId": 42161,
          "action": "buy_pt",
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3",
          "tokenIn": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
          "amount": "10000000",
          "receiver": "0x1111111111111111111111111111111111111111"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return d.ok === true && d.preview != null;
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          const p = d.preview;
          return typeof p.priceImpact === 'number' && p.routerAddress != null && p.expectedOutputs != null;
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return d.nextTool != null && d.nextTool.tool === 'buy_pt';

  - description: "preview_trade pendle_swap returns preview"
    vars:
      prompt: >
        {"tool": "preview_trade", "args": {
          "chainId": 42161,
          "action": "pendle_swap",
          "tokenIn": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
          "tokenOut": "0x82aF49447D8a07e3bd95BD0d56f35241523fBab1",
          "amount": "10000000",
          "receiver": "0x1111111111111111111111111111111111111111"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return d.ok === true && d.preview != null && typeof d.preview.priceImpact === 'number';

  - description: "preview_trade invalid mode returns validation error"
    vars:
      prompt: >
        {"tool": "preview_trade", "args": {
          "chainId": 42161,
          "action": "add_liquidity",
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3",
          "tokenIn": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
          "amount": "10000000",
          "receiver": "0x1111111111111111111111111111111111111111",
          "mode": "dual"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          return s.toLowerCase().includes('invalid') || s.toLowerCase().includes('error') || s.includes('Expected');

  # ══════════════════════════════════════════════════════════════════════════
  # ACTION TOOLS — buy/sell PT/YT
  # ══════════════════════════════════════════════════════════════════════════

  - description: "buy_pt returns shaped tx with approvals"
    vars:
      prompt: >
        {"tool": "buy_pt", "args": {
          "chainId": 42161,
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3",
          "tokenIn": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
          "amount": "10000000",
          "receiver": "0x1111111111111111111111111111111111111111"
        }}
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return d.transaction?.to != null && d.transaction?.data != null;
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return typeof d.action === 'string' && typeof d.priceImpact === 'number';
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return Array.isArray(d.approvals);

  - description: "sell_pt returns shaped tx"
    vars:
      prompt: >
        {"tool": "sell_pt", "args": {
          "chainId": 42161,
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3",
          "tokenOut": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
          "amount": "10000000000000000000",
          "receiver": "0x1111111111111111111111111111111111111111"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return d.transaction?.to != null && d.transaction?.data != null;

  - description: "buy_yt returns shaped tx with priceImpact"
    vars:
      prompt: >
        {"tool": "buy_yt", "args": {
          "chainId": 42161,
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3",
          "tokenIn": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
          "amount": "10000000",
          "receiver": "0x1111111111111111111111111111111111111111"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return d.transaction?.to != null && typeof d.priceImpact === 'number';

  - description: "sell_yt returns shaped tx"
    vars:
      prompt: >
        {"tool": "sell_yt", "args": {
          "chainId": 42161,
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3",
          "tokenOut": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
          "amount": "10000000000000000000",
          "receiver": "0x1111111111111111111111111111111111111111"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return d.transaction?.to != null && d.transaction?.data != null;

  # ══════════════════════════════════════════════════════════════════════════
  # ACTION TOOLS — pendle_swap (ERC20-to-ERC20 via aggregator)
  # ══════════════════════════════════════════════════════════════════════════

  - description: "pendle_swap swaps USDC to WETH via aggregator"
    vars:
      prompt: >
        {"tool": "pendle_swap", "args": {
          "chainId": 42161,
          "tokenIn": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
          "tokenOut": "0x82aF49447D8a07e3bd95BD0d56f35241523fBab1",
          "amount": "10000000",
          "receiver": "0x1111111111111111111111111111111111111111"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return d.transaction?.to != null && d.transaction?.data != null;
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return typeof d.priceImpact === 'number' && Array.isArray(d.outputs);

  # ══════════════════════════════════════════════════════════════════════════
  # ACTION TOOLS — liquidity
  # ══════════════════════════════════════════════════════════════════════════

  - description: "add_liquidity single mode returns add-liquidity action"
    vars:
      prompt: >
        {"tool": "add_liquidity", "args": {
          "chainId": 42161,
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3",
          "tokenIn": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
          "amount": "10000000",
          "receiver": "0x1111111111111111111111111111111111111111"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return typeof d.action === 'string' && d.action.includes('add-liquidity');

  - description: "add_liquidity zpi mode returns tx"
    vars:
      prompt: >
        {"tool": "add_liquidity", "args": {
          "chainId": 42161,
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3",
          "tokenIn": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
          "amount": "10000000",
          "receiver": "0x1111111111111111111111111111111111111111",
          "mode": "zpi"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return d.transaction?.to != null && d.transaction?.data != null;

  - description: "add_liquidity invalid mode returns validation error"
    vars:
      prompt: >
        {"tool": "add_liquidity", "args": {
          "chainId": 42161,
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3",
          "tokenIn": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
          "amount": "10000000",
          "receiver": "0x1111111111111111111111111111111111111111",
          "mode": "dual"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          return s.toLowerCase().includes('invalid') || s.toLowerCase().includes('error') || s.includes('Expected');

  - description: "remove_liquidity returns remove-liquidity action"
    vars:
      prompt: >
        {"tool": "remove_liquidity", "args": {
          "chainId": 42161,
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3",
          "tokenOut": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
          "amount": "1000000000000000000",
          "receiver": "0x1111111111111111111111111111111111111111"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return typeof d.action === 'string' && d.action.includes('remove-liquidity');

  # ══════════════════════════════════════════════════════════════════════════
  # ACTION TOOLS — mint/redeem
  # ══════════════════════════════════════════════════════════════════════════

  - description: "mint_redeem mint-sy returns tx"
    vars:
      prompt: >
        {"tool": "mint_redeem", "args": {
          "chainId": 42161,
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3",
          "action": "mint-sy",
          "token": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
          "amount": "10000000",
          "receiver": "0x1111111111111111111111111111111111111111"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return d.transaction?.to != null && d.transaction?.data != null;

  - description: "mint_redeem redeem-sy returns tx"
    vars:
      prompt: >
        {"tool": "mint_redeem", "args": {
          "chainId": 42161,
          "market": "0x8a8a557b90ec79496a18a1f9c9da8bbd7db86fd3",
          "action": "redeem-sy",
          "token": "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
          "amount": "1000000000000000000",
          "receiver": "0x1111111111111111111111111111111111111111"
        }}
    assert:
      - type: javascript
        value: |
          const s = String(output);
          const d = JSON.parse(s);
          return d.transaction?.to != null && d.transaction?.data != null;

  - description: "mint_redeem mint-py returns tx with 2 outputs"
    vars:
      prompt: >
